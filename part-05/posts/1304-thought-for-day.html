<h1>Thought for the Day</h1><p class="date">10/16/2010</p>
<div class="content"><div align="center"><strong><span style="font-size:130%;color:#cc0000;">Always dream and shoot higher than you know how to.  Don't bother just to be better than your contemporaries or predecessors.  </span></strong></div><div align="center"><strong><span style="font-size:130%;color:#cc0000;">Try to be better than <em>yourself</em>.</span></strong></div><div align="center"><strong>- William Faulkner</strong></div></div></article></body></html>
