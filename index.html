<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<meta name="theme-color" content="#ffffff">
<title>ventdj — Archive</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="app.css">
</head>
<body>

<div class="app">

  <header class="appbar">
    <button id="backBtn" class="iconbtn" hidden><i class="fa-solid fa-chevron-left"></i></button>
    <div class="title" id="appTitle">ventdj <small>offline archive · 2,405 posts</small></div>
  </header>

  <div class="searchwrap" id="searchwrap">
    <label class="search">
      <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
      <input id="search" type="search" placeholder="Search titles &amp; text…" autocomplete="off">
    </label>
    <div class="filters">
      <select id="year"><option value="">All years</option></select>
      <select id="sort">
        <option value="old">Oldest first</option>
        <option value="new">Newest first</option>
        <option value="az">Title A→Z</option>
      </select>
    </div>
    <div id="count" class="count"></div>
  </div>

  <main class="screens">
    <section id="screenList" class="screen active">
      <div id="list" class="list"></div>
    </section>
    <section id="screenPost" class="screen">
      <div id="viewer" class="viewer"></div>
    </section>
    <section id="screenGallery" class="screen">
      <div id="grid" class="grid"></div>
      <div id="sentinel" class="sentinel"></div>
    </section>
  </main>

  <nav class="tabbar">
    <button id="tabReader" class="tab active"><span class="ic"><i class="fa-solid fa-book-open"></i></span>Reader</button>
    <button id="tabGallery" class="tab"><span class="ic"><i class="fa-solid fa-images"></i></span>Gallery</button>
  </nav>

</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox">
  <span id="lbClose" class="x"><i class="fa-solid fa-xmark"></i></span>
  <span id="lbPrev" class="nav prev"><i class="fa-solid fa-chevron-left"></i></span>
  <img id="lbImg" alt="">
  <span id="lbNext" class="nav next"><i class="fa-solid fa-chevron-right"></i></span>
  <div id="lbCap" class="cap"></div>
</div>

<script src="app.js"></script>
</body>
</html>
