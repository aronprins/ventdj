<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<meta name="theme-color" content="#85251a">
<title>Mr. D's Ventriloquist Journal</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="app.css?v=db3bcf0c">
</head>
<body>

<div class="app">

  <header class="appbar">
    <button id="backBtn" class="iconbtn" hidden aria-label="Back"><i class="fa-solid fa-chevron-left"></i></button>
    <div class="title" id="appTitle">Mr. D's Ventriloquist Journal</div>
    <button id="searchBtn" class="iconbtn" aria-label="Search"><i class="fa-solid fa-magnifying-glass"></i></button>
    <button id="filterBtn" class="iconbtn" aria-label="Filter &amp; sort"><i class="fa-solid fa-sliders"></i></button>

    <div class="searchbar" id="searchbar">
      <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
      <input id="search" type="search" placeholder="Search titles &amp; text…" autocomplete="off">
      <button id="searchClose" class="iconbtn" aria-label="Close search"><i class="fa-solid fa-xmark"></i></button>
    </div>
  </header>

  <div class="chips" id="chips"></div>

  <main class="screens">
    <section id="screenList" class="screen active">
      <div id="list" class="list"></div>
    </section>
    <section id="screenPost" class="screen">
      <div id="viewer" class="viewer"></div>
    </section>
    <section id="screenGallery" class="screen">
      <div id="grid" class="grid"></div>
      <div id="sentinel" class="sentinel"></div>
    </section>
    <section id="screenDiscover" class="screen">
      <div id="discover" class="discover"></div>
    </section>
    <section id="screenAbout" class="screen">
      <div id="about" class="about"></div>
    </section>
  </main>

  <nav class="tabbar">
    <button id="tabReader" class="tab active"><span class="ic"><i class="fa-solid fa-book-open"></i></span>Reader</button>
    <button id="tabGallery" class="tab"><span class="ic"><i class="fa-solid fa-images"></i></span>Gallery</button>
    <button id="tabDiscover" class="tab"><span class="ic"><i class="fa-solid fa-compass"></i></span>Discover</button>
    <button id="tabAbout" class="tab"><span class="ic"><i class="fa-solid fa-circle-info"></i></span>About</button>
  </nav>

</div>

<!-- Filter & sort sheet -->
<div class="sheet-backdrop" id="sheetBackdrop"></div>
<aside class="sheet" id="filterSheet" aria-hidden="true">
  <div class="sheet-handle"></div>
  <h3>Filter &amp; sort</h3>
  <label class="field">Year
    <select id="year"><option value="">All years</option></select>
  </label>
  <label class="field">Sort
    <select id="sort">
      <option value="old">Oldest first</option>
      <option value="new">Newest first</option>
      <option value="az">Title A→Z</option>
    </select>
  </label>
  <div class="sheet-actions">
    <button id="filterReset" class="btn">Reset</button>
    <button id="filterDone" class="btn primary">Done</button>
  </div>
</aside>

<!-- Fullscreen image viewer -->
<div id="lightbox" class="lightbox" aria-hidden="true">
  <div class="lb-top">
    <button id="lbClose" class="lb-btn" aria-label="Close viewer"><i class="fa-solid fa-xmark"></i></button>
    <div id="lbCount" class="lb-count"></div>
    <button id="lbOpen" class="lb-btn" aria-label="Open the post"><i class="fa-solid fa-up-right-from-square"></i></button>
  </div>
  <div id="lbTrack" class="lb-track">
    <div class="lb-slide"><img alt=""></div>
    <div class="lb-slide"><img alt=""></div>
    <div class="lb-slide"><img alt=""></div>
  </div>
  <button id="lbPrev" class="lb-arrow prev" aria-label="Previous image"><i class="fa-solid fa-chevron-left"></i></button>
  <button id="lbNext" class="lb-arrow next" aria-label="Next image"><i class="fa-solid fa-chevron-right"></i></button>
  <div id="lbCap" class="lb-cap"></div>
</div>

<script src="app.js?v=db3bcf0c"></script>
</body>
</html>
